name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - .github/workflows/pages.yml
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  pages-disabled:
    if: ${{ !github.event.repository.has_pages }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain required repository setting
        run: |
          echo "GitHub Pages is not enabled for this repository."
          echo "Enable it in Settings > Pages and select GitHub Actions as the source."
          echo "After that, push again or rerun this workflow to deploy docs/."

  build:
    if: ${{ github.event.repository.has_pages }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    if: ${{ github.event.repository.has_pages }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
