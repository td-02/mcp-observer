project_name: mcpscope

before:
  hooks:
    - cd dashboard && npm ci
    - cd dashboard && npm run build

builds:
  - id: mcpscope
    main: .
    binary: mcpscope
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    ids:
      - mcpscope
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: git

release:
  github:
    owner: td-02
    name: mcpscope
