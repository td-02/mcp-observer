project_name: mcpscope

before:
  hooks:
    - cd dashboard && npm ci && npm run build

builds:
  - id: mcpscope
    main: .
    binary: mcpscope
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    ids:
      - mcpscope
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: git

release:
  github:
    owner: td-02
    name: mcp-observer

dockers:
  - image_templates:
      - ghcr.io/td-02/mcpscope:{{ .Version }}
      - ghcr.io/td-02/mcpscope:latest
    dockerfile: Dockerfile
    use: buildx
    ids:
      - mcpscope
    goos: linux
    goarch: amd64
  - image_templates:
      - ghcr.io/td-02/mcpscope:{{ .Version }}-arm64
    dockerfile: Dockerfile
    use: buildx
    ids:
      - mcpscope
    goos: linux
    goarch: arm64

brews:
  - repository:
      owner: td-02
      name: homebrew-tap
    directory: Formula
    homepage: https://github.com/td-02/mcp-observer
    description: Transparent MCP proxy with tracing, schema snapshots, and a live dashboard
    license: MIT
    commit_author:
      name: mcpscope-bot
      email: releases@mcpscope.dev
    install: |
      bin.install "mcpscope"
    test: |
      system "#{bin}/mcpscope", "--help"
